name: Clean Cloudflare Deployments

on:
  schedule:
    # Run once a week on Sundays at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Prune Old Deployments
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: 'saroak'
          KEEP_LAST: 5
        run: |
          echo "Fetching all deployments for project: $PROJECT_NAME"
          
          # Fetch all deployments using the Cloudflare API
          RESPONSE=$(curl -s -X GET "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments" \
               -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
               -H "Content-Type: application/json")
               
          # Check if the request was successful
          SUCCESS=$(echo "$RESPONSE" | jq -r '.success')
          if [ "$SUCCESS" != "true" ]; then
            echo "Failed to fetch deployments. Check your API Token and Account ID."
            echo "$RESPONSE" | jq '.errors'
            exit 1
          fi

          # Extract an array of all deployment IDs, sorted newest to oldest (default from API)
          DEPLOYMENT_IDS=$(echo "$RESPONSE" | jq -r '.result | map(.id) | .[]')
          
          # Convert newline separated list to an array
          mapfile -t ID_ARRAY <<< "$DEPLOYMENT_IDS"
          
          TOTAL_COUNT=${#ID_ARRAY[@]}
          echo "Found $TOTAL_COUNT total deployments."
          
          if [ "$TOTAL_COUNT" -le "$KEEP_LAST" ]; then
            echo "Total deployments ($TOTAL_COUNT) is less than or equal to keeping amount ($KEEP_LAST). Nothing to delete!"
            exit 0
          fi
          
          echo "Keeping the $KEEP_LAST most recent deployments."
          
          # Slice the array to get only the old deployments we want to delete
          DELETE_IDS=("${ID_ARRAY[@]:$KEEP_LAST}")
          
          echo "Proceeding to delete ${#DELETE_IDS[@]} old deployments..."
          
          # Loop through and delete each old deployment
          for ID in "${DELETE_IDS[@]}"; do
            echo "Deleting deployment ID: $ID"
            DEL_RESPONSE=$(curl -s -X DELETE "https://api.cloudflare.com/client/v4/accounts/$CLOUDFLARE_ACCOUNT_ID/pages/projects/$PROJECT_NAME/deployments/$ID" \
                 -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" \
                 -H "Content-Type: application/json")
                 
            DEL_SUCCESS=$(echo "$DEL_RESPONSE" | jq -r '.success')
            if [ "$DEL_SUCCESS" != "true" ]; then
              echo "Warning: Failed to delete deployment $ID"
              echo "$DEL_RESPONSE" | jq '.errors'
            fi
            
            # Sleep briefly to avoid hitting Cloudflare API rate limits
            sleep 1
          done
          
          echo "Cleanup complete!"
